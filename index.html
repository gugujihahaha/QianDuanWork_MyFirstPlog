<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的温暖小站 | 粉紫治愈系</title>
  <style>
    /* ========== 全局重置与变量 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    :root {
      /* 粉紫系主色调（温暖治愈） */
      --primary: #d89ef0;
      --primary-light: #f0d9f8;
      --primary-dark: #b87ed8;
      /* 浅色主题 */
      --bg-main: #fff9fc;
      --bg-card: #f5eff7;
      --text-main: #5a4b60;
      --text-secondary: #8a7895;
      /* 通用样式 */
      --radius: 12px;
      --shadow: 0 4px 12px rgba(216, 158, 240, 0.1);
      --shadow-hover: 0 8px 24px rgba(216, 158, 240, 0.2);
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
    }

    [data-theme="dark"] {
      /* 深色主题（粉紫适配） */
      --primary: #c88ee0;
      --primary-light: #b87ed8;
      --primary-dark: #a06bc0;
      --bg-main: #2d2336;
      --bg-card: #3d3048;
      --text-main: #e8d9f0;
      --text-secondary: #c8b8d0;
    }

    body {
      font-family: "Inter", "Microsoft YaHei", sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      padding: 0 var(--spacing-md);
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ========== 通用组件 ========== */
    .btn {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      border: none;
      color: white;
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .card {
      background-color: var(--bg-card);
      border-radius: var(--radius);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow);
      margin-bottom: var(--spacing-lg);
    }

    .input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 2px solid var(--primary-light);
      border-radius: var(--radius);
      background-color: transparent;
      color: var(--text-main);
      font-size: 1rem;
      margin-bottom: var(--spacing-md);
    }

    .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(216, 158, 240, 0.1);
    }

    /* ========== 布局模块 ========== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-xl) 0;
      margin-bottom: var(--spacing-xl);
    }

    .logo {
      font-size: 2rem;
      font-weight: 600;
      color: var(--primary-dark);
    }

    .theme-toggle {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--primary);
    }

    section {
      margin-bottom: var(--spacing-xl);
    }

    .section-title {
      font-size: 1.8rem;
      color: var(--primary-dark);
      margin-bottom: var(--spacing-lg);
      border-bottom: 2px solid var(--primary-light);
      padding-bottom: var(--spacing-sm);
    }

    footer {
      text-align: center;
      padding: var(--spacing-lg) 0;
      color: var(--text-secondary);
      margin-top: var(--spacing-xl);
    }

    /* ========== 关于我模块 ========== */
    .about-content {
      display: flex;
      gap: var(--spacing-lg);
      flex-wrap: wrap;
      align-items: center;
    }

    .about-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary-light);
    }

    .about-text {
      flex: 1;
      min-width: 300px;
    }

    .about-text p {
      margin-bottom: var(--spacing-md);
      font-size: 1.1rem;
    }

    /* ========== 照片墙模块 ========== */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--spacing-md);
    }

    .photo-card {
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
    }

    .photo-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .photo-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    /* ========== 音乐播放模块 ========== */
    .music-player {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .music-list {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
      margin-bottom: var(--spacing-md);
    }

    .music-item {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius);
      background-color: var(--primary-light);
      color: var(--text-main);
      cursor: pointer;
    }

    .music-item.active {
      background-color: var(--primary);
      color: white;
    }

    .music-controls {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .music-progress {
      flex: 1;
      height: 8px;
      background-color: var(--text-secondary);
      border-radius: 4px;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary);
      border-radius: 4px;
      width: 0%;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .volume-slider {
      width: 80px;
      accent-color: var(--primary);
    }

    /* ========== 随手记模块 ========== */
    .note-form {
      margin-bottom: var(--spacing-lg);
    }

    .note-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .note-item {
      padding: var(--spacing-md);
      border-left: 4px solid var(--primary);
      background-color: var(--bg-card);
      border-radius: 0 var(--radius) var(--radius) 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .note-delete {
      color: var(--primary-dark);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .note-delete:hover {
      color: var(--primary);
    }

    /* ========== 留言板模块 ========== */
    .message-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .message-item {
      padding: var(--spacing-md);
      background-color: var(--bg-card);
      border-radius: var(--radius);
    }

    .message-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: var(--spacing-sm);
    }

    .message-delete {
      color: var(--primary-dark);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 头部导航 -->
  <header>
    <div class="logo">我的温暖小站</div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </header>

  <main>
    <!-- 关于我模块 -->
    <section class="module about">
      <h2 class="section-title">关于我</h2>
      <div class="card about-content">
        <img src="https://picsum.photos/200/200?random=1" alt="个人头像" class="about-avatar">
        <div class="about-text">
          <p>你好呀～我是一个喜欢记录生活、分享美好瞬间的人✨</p>
          <p>偏爱粉紫色的温柔，喜欢听舒缓的音乐，用文字和照片留住生活里的小确幸。</p>
          <p>这个小站是我的小小天地，愿这里的一切能给你带来温暖和治愈～</p>
        </div>
      </div>
    </section>

    <!-- 照片墙模块 -->
    <section class="module photo-wall">
      <h2 class="section-title">照片墙</h2>
      <div class="photo-grid">
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=2" alt="生活瞬间" loading="lazy"></div>
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=3" alt="生活瞬间" loading="lazy"></div>
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=4" alt="生活瞬间" loading="lazy"></div>
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=5" alt="生活瞬间" loading="lazy"></div>
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=6" alt="生活瞬间" loading="lazy"></div>
        <div class="photo-card"><img src="https://picsum.photos/400/400?random=7" alt="生活瞬间" loading="lazy"></div>
      </div>
    </section>

    <!-- 音乐播放模块 -->
    <section class="module music">
      <h2 class="section-title">治愈音乐</h2>
      <div class="card music-player">
        <div class="music-list" id="musicList">
          <div class="music-item" data-id="1">温柔的风</div>
          <div class="music-item" data-id="2">星空下的旋律</div>
          <div class="music-item" data-id="3">粉紫梦境</div>
        </div>
        <div class="music-controls">
          <button class="btn" id="playBtn">播放</button>
          <button class="btn" id="pauseBtn">暂停</button>
          <div class="music-progress" id="progressBar">
            <div class="progress-bar" id="currentProgress"></div>
          </div>
          <div class="volume-control">
            <span>🔊</span>
            <input type="range" min="0" max="1" step="0.1" value="0.7" class="volume-slider" id="volumeSlider">
          </div>
        </div>
        <audio id="audioPlayer" src="" preload="metadata"></audio>
      </div>
    </section>

    <!-- 随手记模块 -->
    <section class="module notes">
      <h2 class="section-title">随手记</h2>
      <div class="card">
        <div class="note-form">
          <input type="text" class="input" id="noteInput" placeholder="写下你的小心情、小感悟～">
          <button class="btn" id="addNoteBtn">添加笔记</button>
        </div>
        <div class="note-list" id="noteList"></div>
      </div>
    </section>

    <!-- 留言板模块 -->
    <section class="module message-board">
      <h2 class="section-title">留言板</h2>
      <div class="card">
        <div class="message-form">
          <input type="text" class="input" id="messageName" placeholder="你的昵称">
          <textarea class="input" id="messageContent" rows="3" placeholder="留下你的悄悄话吧～"></textarea>
          <button class="btn" id="addMessageBtn">发送留言</button>
        </div>
        <div class="message-list" id="messageList"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 我的温暖小站 | 粉紫治愈系 ✨</p>
  </footer>

  <script>
    // ========== 工具函数封装 ==========
    // localStorage操作
    const storage = {
      get: (key) => {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : [];
      },
      set: (key, data) => {
        localStorage.setItem(key, JSON.stringify(data));
      },
      remove: (key, index) => {
        const data = storage.get(key);
        data.splice(index, 1);
        storage.set(key, data);
        return data;
      }
    };

    // 防抖函数
    const debounce = (fn, delay = 500) => {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    };

    // ========== 主题切换 ==========
    const themeToggle = document.getElementById('themeToggle');
    const initTheme = () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      themeToggle.innerText = savedTheme === 'light' ? '🌙' : '☀️';
    };

    const toggleTheme = () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.innerText = newTheme === 'light' ? '🌙' : '☀️';
    };

    themeToggle.addEventListener('click', toggleTheme);

    // ========== 音乐播放器 ==========
    class MusicPlayer {
      constructor() {
        this.audio = document.getElementById('audioPlayer');
        this.musicList = document.getElementById('musicList');
        this.playBtn = document.getElementById('playBtn');
        this.pauseBtn = document.getElementById('pauseBtn');
        this.progressBar = document.getElementById('progressBar');
        this.currentProgress = document.getElementById('currentProgress');
        this.volumeSlider = document.getElementById('volumeSlider');
        this.musics = [
          { id: 1, src: 'https://music.163.com/song/media/outer/url?id=1879461642.mp3' }, // 示例音乐链接（可替换）
          { id: 2, src: 'https://music.163.com/song/media/outer/url?id=1880327100.mp3' },
          { id: 3, src: 'https://music.163.com/song/media/outer/url?id=1879461643.mp3' }
        ];
        this.currentMusicId = storage.get('currentMusicId')[0] || 1;
        this.currentTime = storage.get('currentMusicTime')[0] || 0;
        this.volume = storage.get('musicVolume')[0] || 0.7;
        this.init();
      }

      init() {
        // 初始化音量
        this.audio.volume = this.volume;
        this.volumeSlider.value = this.volume;
        // 初始化当前播放音乐
        this.setMusic(this.currentMusicId);
        // 恢复播放进度
        this.audio.currentTime = this.currentTime;
        // 绑定事件
        this.bindEvents();
      }

      bindEvents() {
        // 选择音乐
        this.musicList.addEventListener('click', (e) => {
          if (e.target.classList.contains('music-item')) {
            const id = Number(e.target.dataset.id);
            this.setMusic(id);
            this.play();
          }
        });

        // 播放/暂停
        this.playBtn.addEventListener('click', () => this.play());
        this.pauseBtn.addEventListener('click', () => this.pause());

        // 进度条更新
        this.audio.addEventListener('timeupdate', () => this.updateProgress());

        // 进度条点击跳转
        this.progressBar.addEventListener('click', (e) => {
          const progressWidth = this.progressBar.offsetWidth;
          const clickX = e.offsetX;
          const duration = this.audio.duration;
          this.audio.currentTime = (clickX / progressWidth) * duration;
        });

        // 音量控制
        this.volumeSlider.addEventListener('input', (e) => {
          this.volume = e.target.value;
          this.audio.volume = this.volume;
          storage.set('musicVolume', [this.volume]);
        });

        // 保存播放进度
        this.audio.addEventListener('pause', () => {
          storage.set('currentMusicTime', [this.audio.currentTime]);
        });

        // 音乐结束自动切歌
        this.audio.addEventListener('ended', () => {
          let nextId = this.currentMusicId + 1;
          if (nextId > this.musics.length) nextId = 1;
          this.setMusic(nextId);
          this.play();
        });
      }

      setMusic(id) {
        // 移除之前的active状态
        document.querySelectorAll('.music-item').forEach(item => {
          item.classList.remove('active');
        });
        // 设置新音乐
        const music = this.musics.find(m => m.id === id);
        if (music) {
          this.audio.src = music.src;
          this.currentMusicId = id;
          storage.set('currentMusicId', [id]);
          // 添加active状态
          document.querySelector(`.music-item[data-id="${id}"]`).classList.add('active');
        }
      }

      play() {
        this.audio.play();
        this.playBtn.innerText = '播放中';
      }

      pause() {
        this.audio.pause();
        this.playBtn.innerText = '播放';
      }

      updateProgress() {
        const progress = (this.audio.currentTime / this.audio.duration) * 100;
        this.currentProgress.style.width = `${progress}%`;
      }
    }

    // ========== 随手记功能 ==========
    const initNotes = () => {
      const noteInput = document.getElementById('noteInput');
      const addNoteBtn = document.getElementById('addNoteBtn');
      const noteList = document.getElementById('noteList');
      const notes = storage.get('notes');

      // 渲染笔记
      const renderNotes = () => {
        noteList.innerHTML = '';
        const notes = storage.get('notes');
        notes.forEach((note, index) => {
          const noteItem = document.createElement('div');
          noteItem.className = 'note-item';
          noteItem.innerHTML = `
            <span>${note}</span>
            <span class="note-delete" data-index="${index}">🗑️</span>
          `;
          noteList.appendChild(noteItem);
        });
      };

      // 添加笔记
      const addNote = debounce(() => {
        const content = noteInput.value.trim();
        if (!content) {
          alert('笔记内容不能为空哦～');
          return;
        }
        const notes = storage.get('notes');
        notes.push(content);
        storage.set('notes', notes);
        noteInput.value = '';
        renderNotes();
      });

      // 删除笔记
      noteList.addEventListener('click', (e) => {
        if (e.target.classList.contains('note-delete')) {
          const index = Number(e.target.dataset.index);
          storage.remove('notes', index);
          renderNotes();
        }
      });

      addNoteBtn.addEventListener('click', addNote);
      renderNotes();
    };

    // ========== 留言板功能 ==========
    const initMessages = () => {
      const messageName = document.getElementById('messageName');
      const messageContent = document.getElementById('messageContent');
      const addMessageBtn = document.getElementById('addMessageBtn');
      const messageList = document.getElementById('messageList');
      const messages = storage.get('messages');

      // 渲染留言
      const renderMessages = () => {
        messageList.innerHTML = '';
        const messages = storage.get('messages');
        messages.forEach((msg, index) => {
          const messageItem = document.createElement('div');
          messageItem.className = 'message-item';
          messageItem.innerHTML = `
            <div class="message-meta">
              <span>${msg.name}</span>
              <span>${msg.time}</span>
              <span class="message-delete" data-index="${index}">🗑️</span>
            </div>
            <p>${msg.content}</p>
          `;
          messageList.appendChild(messageItem);
        });
      };

      // 添加留言
      const addMessage = debounce(() => {
        const name = messageName.value.trim();
        const content = messageContent.value.trim();
        if (!name || !content) {
          alert('昵称和留言内容都不能为空哦～');
          return;
        }
        const now = new Date();
        const time = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const messages = storage.get('messages');
        messages.push({ name, content, time });
        storage.set('messages', messages);
        messageName.value = '';
        messageContent.value = '';
        renderMessages();
      });

      // 删除留言
      messageList.addEventListener('click', (e) => {
        if (e.target.classList.contains('message-delete')) {
          const index = Number(e.target.dataset.index);
          storage.remove('messages', index);
          renderMessages();
        }
      });

      addMessageBtn.addEventListener('click', addMessage);
      renderMessages();
    };

    // ========== 页面初始化 ==========
    window.addEventListener('DOMContentLoaded', () => {
      initTheme(); // 初始化主题
      new MusicPlayer(); // 初始化音乐播放器
      initNotes(); // 初始化随手记
      initMessages(); // 初始化留言板
    });
  </script>
</body>
</html>
